<!DOCTYPE html>
<html>
<head>
    <title>Direct Test - Add Process to Product</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <h1>Direct Test - Add Process to Product</h1>
    
    <div id="result"></div>
    
    <form id="testForm">
        <label>Product ID: <input type="number" name="product_id" value="10" readonly></label><br><br>
        <label>Process IDs: <input type="text" name="process_ids" value="21" placeholder="21,22,23"></label><br><br>
        <button type="submit">Test Add Process</button>
    </form>

    <script>
    $('#testForm').on('submit', function(e) {
        e.preventDefault();
        
        var productId = $('input[name="product_id"]').val();
        var processIds = $('input[name="process_ids"]').val();
        
        $('#result').html('<p>Testing... ProductID: ' + productId + ', ProcessIDs: ' + processIds + '</p>');
        
        $.ajax({
            url: '/test/products/' + productId + '/processes/add',
            method: 'POST',
            data: {
                process_ids: processIds
            },
            success: function(response) {
                console.log('Success:', response);
                $('#result').html('<div style="color: green;"><h3>Success!</h3><pre>' + JSON.stringify(response, null, 2) + '</pre></div>');
            },
            error: function(xhr, status, error) {
                console.log('Error:', xhr.responseText);
                $('#result').html('<div style="color: red;"><h3>Error!</h3><p>Status: ' + status + '</p><p>Error: ' + error + '</p><p>Response: ' + xhr.responseText + '</p></div>');
            }
        });
    });
    </script>
</body>
</html>
