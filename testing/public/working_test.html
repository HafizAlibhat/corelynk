<!DOCTYPE html>
<html>
<head>
    <title>WORKING Test - View Processes & Batches</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>WORKING Test - View Processes & Batches</h2>
        
        <div class="card">
            <div class="card-body">
                <h5>Work Order Item</h5>
                <p>Product: 13 (ID: 10)</p>
                
                <!-- This button WILL work -->
                <button class="btn btn-primary" onclick="showProcesses()">
                    View Processes & Batches
                </button>
                
                <div id="results" class="mt-3" style="display:none;">
                    <!-- Results will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
    async function showProcesses() {
        console.log('Button clicked - starting...');
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div class="alert alert-info">Loading processes...</div>';
        
        try {
            // Test the exact URL that should work
            const url = 'http://localhost/pro_sys/public/index.php/work-orders/1/items/1/processes?product_id=10';
            console.log('Fetching:', url);
            
            const response = await fetch(url, {
                method: 'GET',
                credentials: 'same-origin',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });
            
            console.log('Response status:', response.status);
            console.log('Response headers:', response.headers.get('content-type'));
            
            if (response.status === 401) {
                resultsDiv.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>Not logged in!</strong><br>
                        <a href="http://localhost/pro_sys/public/index.php/auth/login" target="_blank" class="btn btn-sm btn-primary mt-2">Login Here</a>
                    </div>
                `;
                return;
            }
            
            if (!response.ok) {
                resultsDiv.innerHTML = `<div class="alert alert-danger">HTTP Error: ${response.status}</div>`;
                return;
            }
            
            const contentType = response.headers.get('content-type');
            
            if (contentType && contentType.includes('application/json')) {
                const data = await response.json();
                console.log('JSON data received:', data);
                
                if (data.success) {
                    let html = '<div class="alert alert-success">SUCCESS! Data loaded:</div>';
                    html += '<h6>Processes:</h6><ul>';
                    
                    if (data.processes && data.processes.length > 0) {
                        data.processes.forEach(process => {
                            html += `<li><strong>${process.process_name || 'Process ' + process.process_id}</strong> - ${process.process_description || 'No description'}</li>`;
                        });
                    } else {
                        html += '<li>No processes found</li>';
                    }
                    
                    html += '</ul><h6>Batches:</h6><ul>';
                    
                    if (data.batches && data.batches.length > 0) {
                        data.batches.forEach(batch => {
                            html += `<li>Batch: ${batch.batch_code} (Planned: ${batch.planned_qty})</li>`;
                        });
                    } else {
                        html += '<li>No batches found</li>';
                    }
                    
                    html += '</ul>';
                    resultsDiv.innerHTML = html;
                } else {
                    resultsDiv.innerHTML = `<div class="alert alert-warning">Server returned: ${data.message || 'Unknown error'}</div>`;
                }
            } else {
                const text = await response.text();
                console.log('Non-JSON response:', text.substring(0, 200));
                resultsDiv.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>Non-JSON Response (probably redirect to login)</strong><br>
                        Response type: ${contentType}<br>
                        <small>First 200 chars: ${text.substring(0, 200).replace(/</g, '&lt;')}</small>
                    </div>
                `;
            }
            
        } catch (error) {
            console.error('Fetch error:', error);
            resultsDiv.innerHTML = `<div class="alert alert-danger">Network Error: ${error.message}</div>`;
        }
    }
    </script>
</body>
</html>
