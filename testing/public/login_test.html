<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Quick Login Test</h2>
        
        <div class="card" style="max-width: 400px;">
            <div class="card-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" value="admin@production.local" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" value="Admin12345!" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                
                <div id="result" class="mt-3"></div>
            </div>
        </div>
        
        <div class="mt-4">
            <h4>Test Links (after login):</h4>
            <p><a href="/pro_sys/public/index.php/work-orders" class="btn btn-outline-primary">Work Orders List</a></p>
            <p><a href="/pro_sys/public/index.php/work-orders/1" class="btn btn-outline-primary">Work Order 1</a></p>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const result = document.getElementById('result');
        
        try {
            const response = await fetch('/pro_sys/public/index.php/auth/login', {
                method: 'POST',
                body: formData,
                credentials: 'same-origin'
            });
            
            console.log('Login response status:', response.status);
            
            if (response.ok) {
                result.innerHTML = '<div class="alert alert-success">Login successful! You can now test the work order pages.</div>';
            } else {
                const text = await response.text();
                result.innerHTML = '<div class="alert alert-danger">Login failed. Status: ' + response.status + '</div>';
                console.log('Login response:', text.substring(0, 300));
            }
        } catch (error) {
            result.innerHTML = '<div class="alert alert-danger">Error: ' + error.message + '</div>';
            console.error('Login error:', error);
        }
    });
    </script>
</body>
</html>
